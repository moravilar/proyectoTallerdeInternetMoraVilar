<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizaciones y noticias</title>
    <link rel="stylesheet" href="css/styleindex.css">
</head>
<body>
    <header>
    <div class="header-top">
        <div class="header-izquierda">
            <button class="btn-hamburguesa" id="btn-hamburguesa" aria-label="Abrir menú">☰</button>
        </div>
        <div class="header-logo">
            <h1>Portal de Noticias</h1>
        </div>
        <div class="header-derecha">
            <button id="btn-darkmode">Modo oscuro</button>
            <a href="login.html" id="link-iniciar">Iniciar sesión</a>
            <div class="dropdown-perfil" id="dropdown-perfil">
                <button id="btn-perfil">Perfil ▾</button>
                <div class="dropdown-menu" id="dropdown-menu">
                    <p id="saludoUsuario"></p>
                    <a href="admin.html" class="dropdown-link">Modificar noticias</a>
                </div>
            </div>
                <button id="boton-logout" style="display:none">Cerrar sesión</button>
            </div>
        </div>
    <nav class="header-nav" id="header-nav">
        <ul>
            <li><a href="index.html#cotizaciones">Última cotización</a></li>
            <li><a href="index.html#cot-historica">Cotización histórica</a></li>
            <li><a href="index.html#noticias">Noticias</a></li>
            <li><a class="Modificar" href="admin.html">Modificar noticias</a></li>
        </ul>
    </nav>
    </nav>
</header>
    <main>
        <h2>Últimas Cotizaciones</h2>
        <section id="cotizaciones">
            <p>Cargando cotizaciones...</p>
        </section>
    <section id="cot-historica">
        <h2> Cotización historica del dolar</h2>
        <form id="formulario">
            <label for="fecha">Elegir una fecha:</label>
            <input type="date" id="fecha">
            <button type="submit">Consultar</button>
        </form>
        <section id="resultadocothist">
            <p></p>
        </section>

        <br>

    </section>
    
    <section class="noticias" id="noticias">
        <h2>Últimas noticias</h2>
        <input id="buscadorxtitulo" placeholder="Buscar Noticia...">
        <div class="ubicacion-noticias">
    </div>
    </section>
    </main>

    <script src="js/initialNews.js"></script>
    <script src="js/darkmode.js"></script>
    <script src="js/dollar.js"></script>
    <script src="js/news.js"></script>
    <script src="js/auth.js"></script>
    
</body>
</html>
