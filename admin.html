<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin</title>
    <link rel="stylesheet" href="css/styleadmin.css">
</head>
<body>
    <script>
        if (!sessionStorage.getItem("token")) {
            window.location.href = "login.html"
        }
    </script>
    <header>
    <div class="header-top">
        <div class="header-izquierda">
            <button class="btn-hamburguesa" id="btn-hamburguesa" aria-label="Abrir menú">☰</button>
        </div>
        <div class="header-logo">
            <h1>Portal de Noticias</h1>
        </div>
        <div class="header-derecha">
            <button id="btn-darkmode">Modo oscuro</button>

            <button id="boton-logout">Cerrar sesión</button>
        </div>

    </div>

    </header>
    <main>

        <div class="cardcambios">

            <h2>¿Qué quieres realizar?</h2>
            <button id="createnoticia">Crear</button> 
            <button id="editnoticia">Editar</button>
            <button id="deletenoticia">Eliminar</button>
        
        </div>
        <br>
        <h2>Últimas noticias</h2>
        <br> 
        <input id="buscadorxtitulo" placeholder="Buscar...">
        <button id="cancelar">Cancelar</button>
        <div class="ubicacion-noticias">
        </div>
    </main>

    <script src="js/initialNews.js"></script>
    <script src="js/darkmode.js"></script>
    <script src="js/news.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/jsadmin.js"></script>
</body>
</html>
